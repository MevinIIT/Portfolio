<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mevin's Music</title>
  <link rel="stylesheet" href="../css/nameless.css" />
</head>

<body>
  <header>
    <a href="../index.html">HOME</a>
    <a href="html/about.html">ABOUT</a>
    <a href="html/testtest.html">PROJECTS</a>
    <a class="active" href="html/nameless.html">CONTACT</a>
    <a href="html/awards.html">AWARDS</a>
  </header>

  <div class="container">
    <div class="profile"></div>
    <img src="../images/prof.png" alt="Profile Picture" class="profile-pic" />
  </div>

  <div class="contact-section">
    <div class="contact-me">
      <h2><em>Contact me</em></h2>
    </div>

    
    <form action="https://formsubmit.co/mevinsankaran@gmail.com" method="POST" class="contact-form" novalidate>

      <label for="first-name">First name</label>
      <input type="text" id="first-name" name="First Name"  />

      <label for="last-name">Last name</label>
      <input type="text" id="last-name" name="Last Name"  />

      <label for="email">Email</label>
      <input type="email" id="email" name="Email"  />

      <label for="message">Message</label>
      <textarea id="message" name="Message" ></textarea>

      <div class="radio">
        <h3 style="margin: 0; color: white;">Sri Lankan:</h3>

        <label>
          <input type="radio" name="Are you Sri Lankan?" value="YES"  />
          YES
        </label>

        <label>
          <input type="radio" name="Are you Sri Lankan?" value="NO"  />
          NO
        </label>
      </div>

      <div class="checkbox">
        <h3 style="color: white;">Reason:</h3>
        <input type="checkbox" id="IT related" name="reason[]" value="IT related" />
        <label for="IT related">IT related</label><br />
        <input type="checkbox" id="Non IT related" name="reason[]" value="Non IT related" />
        <label for="Non IT related">Non IT related</label><br />
      </div>

      
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_next" value="https://yourdomain.com/thank-you.html" />

      <button type="submit">Send</button>
    </form>
  </div>

  <footer>
    <div class="social-icons">
      <a href="https://x.com/">
        <img src="../images/fb.png" alt="Twitter" />
      </a>
      <a href="https://www.instagram.com/mevin_music/">
        <img src="../images/ig.png" alt="Instagram" />
      </a>
      <a href="https://www.youtube.com/@MevinMusic">
        <img src="../images/yt.png" alt="YouTube" />
      </a>
      <a href="https://x.com/">
        <img src="../images/twit.png" alt="Facebook" />
      </a>
      <div class="follow">Follow me on <br />social media</div>
    </div>

    <div class="rights">
      <p>
        <a href="copyright.html" target="_blank">All rights reserved</a> |
        <a href="terms.html" target="_blank">Terms of Use</a> |
        <a href="privacy.html" target="_blank">Privacy Policy</a>
      </p>
    </div>
  </footer>

  <script src="../javascript/nameless.js"></script>
</body>

</html>
